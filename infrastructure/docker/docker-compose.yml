version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_DB: agrivision
      POSTGRES_USER: agrivision_user
      POSTGRES_PASSWORD: agrivision_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agrivision_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - agrivision_network

  backend:
    build: ../../backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://agrivision_user:agrivision_pass@postgres:5432/agrivision
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ../../backend:/app
    depends_on:
      - postgres
      - redis
    networks:
      - agrivision_network

  celery_worker:
    build: ../../backend
    command: celery -A app.workers.ndvi_worker.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://agrivision_user:agrivision_pass@postgres:5432/agrivision
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ../../backend:/app
    depends_on:
      - postgres
      - redis
    networks:
      - agrivision_network

  frontend:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm install && npm start"
    ports:
      - "4200:4200"
    volumes:
      - ../../frontend:/app
    networks:
      - agrivision_network

volumes:
  postgres_data:

networks:
  agrivision_network:
    driver: bridge
