<!DOCTYPE html>
<html>
<head><script src="config.js"></script>
    <title>AgriVision Enhanced Dashboard</title>
    <style>
        body { font-family: Arial; margin: 20px; background: #f0f2f5; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 10px; }
        .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 20px; margin: 20px 0; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; text-align: center; }
        .stat-value { font-size: 32px; font-weight: bold; color: #667eea; }
        button { background: #667eea; color: white; border: none; padding: 10px; margin: 5px; border-radius: 5px; cursor: pointer; }
        .alert { background: #ffebee; border-left: 4px solid #f44336; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🌾 AgriVision Enhanced Analytics Dashboard</h1>
        <p>Real NDVI Processing & Crop Health Monitoring</p>
    </div>
    
    <div class="stats" id="stats"></div>
    
    <div style="background: white; padding: 20px; border-radius: 10px;">
        <h3>⚠️ Active Alerts</h3>
        <div id="alerts"></div>
    </div>
    
    <div style="margin-top: 20px; text-align: center;">
        <button onclick="refreshData()">🔄 Refresh</button>
        <button onclick="location.href='http://127.0.0.1:3000'">📱 Open Main Interface</button>
    </div>
    
    <script>
        async function refreshData() {
            const statsRes = await fetch('/api/v2/stats');
            const stats = await statsRes.json();
            
            document.getElementById('stats').innerHTML = `
                <div class="stat-card"><div class="stat-value">${stats.total_analyses || 0}</div>Total Scans</div>
                <div class="stat-card"><div class="stat-value">${stats.average_health_index || 0}%</div>Avg Health</div>
                <div class="stat-card"><div class="stat-value">${stats.total_area_analyzed?.toFixed(1) || 0} ha</div>Area Analyzed</div>
            `;
            
            const alertsRes = await fetch('/api/v2/alerts');
            const alerts = await alertsRes.json();
            
            if (alerts.alerts && alerts.alerts.length > 0) {
                document.getElementById('alerts').innerHTML = alerts.alerts.map(alert => `
                    <div class="alert">
                        <strong>${alert.field}</strong><br>
                        NDVI: ${alert.ndvi} - ${alert.severity}
                    </div>
                `).join('');
            } else {
                document.getElementById('alerts').innerHTML = '<p>✅ No active alerts - all fields healthy</p>';
            }
        }
        
        refreshData();
        setInterval(refreshData, 10000);
    </script>
</body>
</html>
