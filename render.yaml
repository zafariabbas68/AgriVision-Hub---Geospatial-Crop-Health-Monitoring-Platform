services:
  - type: web
    name: agrivision-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.4

  - type: static
    name: agrivision-frontend
    plan: free
    buildCommand: echo "Static site ready"
    publishPath: simple-frontend
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
